<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Trash Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(22, 163, 74, 0.12) 0%, transparent 60%);
            padding: 2rem;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(22, 163, 74, 0.15);
            border: 1px solid rgba(22, 163, 74, 0.3);
            color: #4ade80;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            margin-bottom: 1.5rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .logo h1 {
            font-size: 1.7rem;
            font-weight: 800;
            color: #f1f5f9;
        }

        .logo h1 span {
            color: #4ade80;
        }

        .logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.35rem;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.82rem;
        }

        .alert-error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.25);
            color: #f87171;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .form-input:focus {
            border-color: #4ade80;
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
        }

        .form-input::placeholder {
            color: #475569;
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: #16a34a;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 0.5rem;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background: #15803d;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(22, 163, 74, 0.35);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .back-link {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.82rem;
            color: #475569;
        }

        .back-link a {
            color: #4ade80;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .security-note {
            margin-top: 1.5rem;
            padding: 0.7rem 1rem;
            background: rgba(239, 68, 68, 0.07);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 8px;
            font-size: 0.78rem;
            color: #94a3b8;
            text-align: center;
        }

        .security-note strong {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <span class="icon">🔐</span>
            <h1>Trash<span>Store</span></h1>
            <div class="badge" style="margin:0 auto;">🛡 Owner Access</div>
            <p style="margin-top:0.75rem;">Admin dashboard login. Restricted area.</p>
        </div>

        <div class="alert alert-error" th:if="${param.error}">
            ⚠ Invalid credentials or insufficient permissions.
        </div>
        <div class="alert alert-error" th:if="${param.accessDenied}">
            ⚠ This account does not have admin access.
        </div>

        <form th:action="@{/login}" method="post">
            <!-- Tell Spring Security to redirect to /admin after success -->
            <input type="hidden" name="redirect" value="/admin" />
            <div class="form-group">
                <label class="form-label" for="username">Admin Username</label>
                <input id="username" class="form-input" type="text" name="username" placeholder="Enter admin username"
                    required autofocus />
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Admin Password</label>
                <input id="password" class="form-input" type="password" name="password"
                    placeholder="Enter admin password" required />
            </div>
            <button type="submit" class="submit-btn">🔐 Access Dashboard</button>
        </form>

        <div class="security-note">
            <strong>Restricted Area.</strong> Unauthorised access is prohibited. All sessions are logged.
        </div>

        <div class="back-link">
            Not an admin? <a href="/login">Customer Login</a>
        </div>
    </div>
</body>

</html>
