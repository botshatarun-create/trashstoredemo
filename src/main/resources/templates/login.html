<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Trash Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon" style="font-size:3rem;display:block;margin-bottom:0.5rem;">♻️</span>
                <h1>Trash<span>Store</span></h1>
                <p>Sign in to your account</p>
            </div>

            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
            <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input id="username" class="form-input" type="text" name="username"
                        placeholder="Enter your username" required autofocus />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-input" type="password" name="password"
                        placeholder="Enter your password" required />
                </div>
                <button type="submit" class="auth-submit">Sign In</button>
            </form>

            <div class="demo-hint">
                💡 Demo: <strong>trashmaster</strong> / <strong>trash123</strong>
            </div>

            <div class="auth-footer">
                New here? <a href="/register">Create an account</a>
            </div>
        </div>
    </div>
</body>

</html>
