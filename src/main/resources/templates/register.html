<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — Trash Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width:460px;">
            <div class="auth-logo">
                <span class="logo-icon" style="font-size:3rem;display:block;margin-bottom:0.5rem;">🌿</span>
                <h1>Create <span>Account</span></h1>
                <p>Join the trash economy. Start from zero, earn as you go.</p>
            </div>

            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input id="username" class="form-input" type="text" name="username" placeholder="Choose a username"
                        required autofocus minlength="3" maxlength="30" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" class="form-input" type="email" name="email" placeholder="your@email.com"
                        required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-input" type="password" name="password"
                        placeholder="Minimum 6 characters" required minlength="6" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" class="form-input" type="password" name="confirmPassword"
                        placeholder="Repeat your password" required />
                </div>
                <button type="submit" class="auth-submit">Create Account</button>
            </form>

            <div
                style="margin-top:1rem;padding:0.7rem 1rem;background:var(--accent-light);border:1px solid var(--border-accent);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--accent);text-align:center;">
                🌱 New accounts start with <strong>0 kg balance</strong> — scan trash to earn!
            </div>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>
</body>

</html>
