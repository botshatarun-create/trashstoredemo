<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders — Trash Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

    <nav class="navbar" id="navbar">
        <a href="/" class="navbar-brand"><span class="logo-icon">♻</span> Trash<span>Store</span></a>
        <ul class="navbar-links">
            <li><a href="/">Home</a></li>
            <li><a href="/shop">Shop</a></li>
            <li><a href="/trash-scan">Scan Trash</a></li>
            <li><a href="/orders" class="active">Orders</a></li>

        </ul>
        <div class="navbar-right">
            <a href="/profile"
                style="display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;font-weight:600;color:var(--text-secondary);">
                <span
                    style="width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;"
                    th:text="${#strings.substring(user.username,0,1).toUpperCase()}">T</span>
            </a>
            <div class="trash-balance">♻ <span th:text="${user.trashBalance} + ' kg'">0kg</span></div>
            <a href="/cart" class="cart-btn">
                🛒 Cart
                <span class="cart-badge" th:text="${cart.totalItems}"
                    th:style="${cart.totalItems == 0} ? 'display:none' : 'display:flex'">0</span>
            </a>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn btn-outline btn-sm">Sign Out</button>
            </form>
        </div>
    </nav>

    <div class="page-header">
        <h1>My <span>Orders</span></h1>
        <p>Your complete purchase history</p>
    </div>

    <section class="section" style="padding-top:1.5rem;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;">
            <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;"
                class="fade-up">
                <div style="font-size:1.5rem;font-weight:800;color:var(--text-primary);" id="orders-count-stat">—</div>
                <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem;">Orders Placed</div>
            </div>
            <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;"
                class="fade-up-delay-1">
                <div style="font-size:1.5rem;font-weight:800;color:var(--accent);"
                    th:text="${user.trashBalance} + ' kg'">0 kg</div>
                <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem;">Balance Remaining</div>
            </div>
            <div style="background:linear-gradient(135deg,#f0fdf4,#f0f9ff);border:1px solid var(--border-accent);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;"
                class="fade-up-delay-2">
                <a href="/trash-scan" class="btn btn-primary btn-sm" style="display:inline-flex;">+ Earn More</a>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.5rem;">Scan trash to refill</div>
            </div>
        </div>

        <div id="orders-container">
            <div style="text-align:center;padding:3rem;color:var(--text-muted);">
                <span class="spinner"></span>
                <p style="margin-top:0.75rem;font-size:0.9rem;">Loading your orders...</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>♻ <span>TrashStore</span> — Turning waste into worth</p>
    </footer>
    <script>
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('navbar-scroll-active', window.scrollY > 10);
        });

        const STATUS_CLASSES = { PENDING: 'pending', PROCESSING: 'processing', SHIPPED: 'shipped', DELIVERED: 'delivered completed', COMPLETED: 'completed delivered' };

        function formatDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        fetch('/api/orders')
            .then(r => r.json())
            .then(orders => {
                document.getElementById('orders-count-stat').textContent = orders.length;
                const container = document.getElementById('orders-container');
                if (orders.length === 0) {
                    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><h3>No orders yet</h3><p>Browse the shop and make your first purchase!</p><a href="/shop" class="btn btn-primary" style="margin-top:1rem;">Browse Shop</a></div>`;
                    return;
                }
                container.innerHTML = orders.map(o => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">Order #${o.id}</div>
              <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.15rem;">${formatDate(o.createdAt)}</div>
            </div>
            <span class="order-status ${STATUS_CLASSES[o.status] || 'pending'}">${o.status}</span>
          </div>
          <div class="order-items-list">
            ${(o.orderItems || []).map(oi => `
              <div class="order-item-row">
                <span>${oi.item ? oi.item.name : 'Item'} &times; ${oi.quantity}</span>
                <span>${oi.pricePaid !== undefined ? (oi.pricePaid * oi.quantity).toFixed(2) + ' kg' : '—'}</span>
              </div>
            `).join('')}
          </div>
          <div class="order-total">Total: ${o.totalTrashPaid} kg of trash</div>
        </div>
      `).join('');
            })
            .catch(() => {
                document.getElementById('orders-container').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Couldn't load orders</h3><p>Please refresh the page.</p></div>`;
            });
    </script>
</body>

</html>
