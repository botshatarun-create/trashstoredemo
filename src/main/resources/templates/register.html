<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - Trash Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(57, 255, 20, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .auth-logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .auth-logo h1 span {
            color: var(--accent-green);
        }

        .auth-logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1.1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.1);
        }

        .auth-submit {
            width: 100%;
            padding: 0.85rem;
            background: var(--accent-green);
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: var(--transition);
        }

        .auth-submit:hover {
            background: #2de00f;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.35);
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-green);
            font-weight: 600;
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.88rem;
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff7777;
        }

        .perks {
            margin-top: 1.2rem;
            padding: 0.75rem 1rem;
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.15);
            border-radius: 10px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .perks strong {
            color: var(--accent-green);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon">&#x267B;</span>
                <h1>Join <span>TrashStore</span></h1>
                <p>Create your account and start turning trash into treasure</p>
            </div>

            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input id="username" class="form-input" type="text" name="username"
                        placeholder="Choose a cool username" required autofocus minlength="3" maxlength="30" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input id="email" class="form-input" type="email" name="email" placeholder="your@email.com"
                        required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-input" type="password" name="password"
                        placeholder="Minimum 6 characters" required minlength="6" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" class="form-input" type="password" name="confirmPassword"
                        placeholder="Repeat your password" required />
                </div>
                <button type="submit" class="auth-submit">&#x1F5D1; Create Account</button>
            </form>

            <div class="perks">
                &#x1F381; New accounts start with <strong>100kg of trash balance</strong> — ready to spend!
            </div>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in here</a>
            </div>
        </div>
    </div>
</body>

</html>
