<!DOCTYPE html>
<html>
<head><title>Trash Store</title></head>
<body style="font-family: Arial; padding: 20px;">
    <h2>♻️ Trash Store</h2>
    <div style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc;">
        <h3>Deposit Trash</h3>
        <select id="type"><option value="PLASTIC">Plastic</option><option value="GLASS">Glass</option></select>
        <input type="number" id="weight" placeholder="Weight (kg)">
        <button onclick="deposit()">Recycle</button>
    </div>
    <div style="padding: 10px; border: 1px solid #ccc;">
        <h3>Buy Products</h3>
        <select id="prod"><option value="1">Bottle (50pts)</option><option value="2">Brush (20pts)</option></select>
        <button onclick="buy()">Buy</button>
    </div>
    <p id="msg" style="color: green; font-weight: bold;"></p>
    <script>
        async function deposit() {
            let w = document.getElementById('weight').value;
            let t = document.getElementById('type').value;
            let res = await fetch(`/api/deposit?customerId=1&type=${t}&weight=${w}`, {method: 'POST'});
            let data = await res.json();
            document.getElementById('msg').innerText = "Success! New Points: " + data.points;
        }
        async function buy() {
            let p = document.getElementById('prod').value;
            let res = await fetch(`/api/buy?customerId=1&productId=${p}`, {method: 'POST'});
            document.getElementById('msg').innerText = await res.text();
        }
    </script>
</body>
</html>
