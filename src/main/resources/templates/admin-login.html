<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Trash Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon" style="font-size:3rem;display:block;margin-bottom:0.5rem;">🔐</span>
                <h1>Trash<span>Store</span></h1>
                <p>Owner / Admin Access</p>
            </div>

            <div
                style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:0.6rem 0.9rem;margin-bottom:1.2rem;font-size:0.8rem;color:#92400e;text-align:center;">
                🛡 Restricted area — Admin accounts only
            </div>

            <div class="alert alert-error" th:if="${param.error}">Invalid credentials or insufficient permissions.</div>
            <div class="alert alert-error" th:if="${param.accessDenied}">This account does not have admin access.</div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Admin Username</label>
                    <input id="username" class="form-input" type="text" name="username"
                        placeholder="Enter admin username" required autofocus />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Admin Password</label>
                    <input id="password" class="form-input" type="password" name="password"
                        placeholder="Enter admin password" required />
                </div>
                <button type="submit" class="auth-submit">🔐 Access Dashboard</button>
            </form>

            <div class="auth-footer">
                Customer? <a href="/login">Sign in here</a>
            </div>
        </div>
    </div>
</body>

</html>
